# Cross-language validation: cceval on Java
# Prerequisite: uv run python -m eval.cceval.fetch_dataset --lang java

chunking:
  language: java
  method: all                 # cast | function | declaration | sliding | all
  max_chunk_sizes:
    - 1000
    - 2000
    - 3000
  metadata_template: cceval
  overlap_lines: 15
  chunk_expansion: false
  private_function: false
  function_overlap: false

query:
  window_size: 10

retrieval:
  embed_models:
    - none
    - bm25
    - Qwen/Qwen3-Embedding-0.6B
    - google/embeddinggemma-300m
    - Qwen/Qwen3-Embedding-4B
  device: cuda
  batch_size: 32
  top_k: 10

inference:
  llms:
    - deepseek-ai/deepseek-coder-6.7b-base
    - bigcode/starcoder2-7b
  max_seq_length: 8192
  max_crossfile_contexts:
    - 2048
    - 4096
    - 8192
  max_generate_tokens: 50
  temperature: 0

evaluation:
  passk: 1
