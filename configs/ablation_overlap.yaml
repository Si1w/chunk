# Ablation study: sliding window overlap

ablation:
  overlap_lines: [0, 5, 10, 15, 20, 25]

chunking:
  language: python
  max_chunk_sizes:
    - 1000
    - 2000
    - 3000
  metadata_template: repoeval

query:
  context_length: 2k
  prompt_type: codex
  window_size: 20

retrieval:
  embed_models:
    - bm25
    - Qwen/Qwen3-Embedding-0.6B
  batch_size: 32
  top_k: 10

inference:
  llms:
    - Qwen/Qwen2.5-Coder-7B
    - deepseek-ai/deepseek-coder-6.7b-base
    - ByteDance-Seed/Seed-Coder-8B-Base
  max_seq_length: 8192
  max_crossfile_contexts:
    - 8192
  max_generate_tokens: 50
  temperature: 0

evaluation:
  split: both
  passk: 1
