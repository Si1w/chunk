# Ablation study: sliding window overlap

# --- Ablation Parameters ---
ablation:
  overlap_values: [10, 15, 20, 25]
  max_chunk_sizes: [1000, 2000, 3000]
  chunk_size_to_context_tokens:
    1000: 2048
    2000: 4000
    3000: 9999

# --- Query ---
query:
  context_length: 2k
  prompt_type: codex
  window_size: 20

# --- Retrieval ---
retrieval:
  embed_models:
    - bm25
    - Qwen/Qwen3-Embedding-0.6B
    - google/embeddinggemma-300m
    - Qwen/Qwen3-Embedding-4B
  batch_size: 32
  top_k: 10

# --- Inference ---
inference:
  llms:
    - Qwen/Qwen2.5-Coder-7B
  max_seq_length: 8192
  max_generate_tokens: 50
  temperature: 0

# --- Evaluation ---
evaluation:
  split: both
  passk: 1
