# Pilot experiment: verify the full pipeline with 5 instances

# --- Pilot ---
pilot:
  num_queries: 5

# --- Chunking ---
chunking:
  language: python
  method: sliding
  max_chunk_sizes:
    - 2000
  metadata_template: repoeval
  overlap_lines: 15
  chunk_expansion: false
  private_function: false
  function_overlap: false

# --- Query ---
query:
  context_length: 2k
  prompt_type: codex
  window_size: 20

# --- Retrieval ---
retrieval:
  embed_models:
    - bm25
    - Qwen/Qwen3-Embedding-0.6B
  batch_size: 32
  top_k: 10

# --- Inference ---
inference:
  llms:
    - Qwen/Qwen2.5-Coder-7B
  max_seq_length: 8192
  max_crossfile_contexts:
    - 2048
  max_generate_tokens: 50
  temperature: 0

# --- Evaluation ---
evaluation:
  split: api
  passk: 1
